<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Arena / Colosseum arches -->
  <!-- Outer arch row -->
  <path d="M4,28 L4,18 Q4,6 20,6 Q36,6 36,18 L36,28" fill="url(#g1)"/>
  <!-- Arch cutouts top row -->
  <path d="M9,28 L9,19 Q9,14 13,14 Q17,14 17,19 L17,28 Z" fill="#0f0f23"/>
  <path d="M23,28 L23,19 Q23,14 27,14 Q31,14 31,19 L31,28 Z" fill="#0f0f23"/>
  <!-- Center pillar section with § -->
  <rect x="17" y="14" width="6" height="14" fill="url(#g1)"/>
  <!-- Paragraph symbol in center pillar -->
  <text x="20" y="26" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="700" fill="white" opacity="0.95">§</text>
  <!-- Base / ground line -->
  <rect x="2" y="28" width="36" height="4" rx="2" fill="url(#g1)"/>
  <!-- Top rim -->
  <rect x="2" y="5" width="36" height="3" rx="1.5" fill="url(#g1)" opacity="0.6"/>
  <!-- Small decorative arches on top -->
  <circle cx="11" cy="9" r="2" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
  <circle cx="20" cy="9" r="2" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
  <circle cx="29" cy="9" r="2" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
</svg>